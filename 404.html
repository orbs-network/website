<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    (function() {
      var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
      if (path) {
        window.location.replace('https://blog.orbs.network/' + path);
      } else {
        window.location.replace('https://blog.orbs.network');
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://blog.orbs.network">blog.orbs.com</a>…</p>
</body>
</html>
